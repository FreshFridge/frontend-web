services:
  web:
    image: ${APP_IMAGE}
    restart: unless-stopped
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://host.docker.internal:3001}
    ports:
      - "${WEB_PORT:-80}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
